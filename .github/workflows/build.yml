name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86-64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: udpiq-rs-${{ matrix.arch }}
          path: target/release/udpiq-rs
          retention-days: 7
